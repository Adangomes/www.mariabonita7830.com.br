<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYDI DELIVERY</title>

<meta name="theme-color" content="#dc2626"/>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mydi">
<link rel="apple-touch-icon" href="imagem/icon-192.png">

<link rel="manifest" href="manifest.json">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
.scroll-x { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 10px; }
.scroll-x::-webkit-scrollbar { display: none; }
@keyframes bounce-short { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
.animate-bounce-short { animation: bounce-short 1s ease-in-out; }
</style>

</head>

<body class="bg-gray-100">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// --- ÍCONES ---
function IconHome(){ return <svg className="w-6 h-6" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 10l9-6 9 6v10a2 2 0 01-2 2h-4v-6H9v6H5a2 2 0 01-2-2z"/></svg>; }
function IconBox(){ return <svg className="w-6 h-6" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 3h18v6H3z"/><path d="M3 9v12h18V9"/></svg>; }
function IconUser(){ return <svg className="w-6 h-6" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="7" r="4"/><path d="M5.5 21a6.5 6.5 0 0113 0"/></svg>; }
function IconDownload(){ return <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>; }

function App(){
  const [tela, setTela] = useState("perfil"); // Inicia no perfil para login
  const [user, setUser] = useState(null);
  const [nome, setNome] = useState("");
  const [telefone, setTelefone] = useState("");

  const restaurantes = [
    { id:1, nome:"SNOOP LANCHE", img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400", mais:"X-Burgão", link_mapa: "https://www.google.com/maps/place/McDonald's/@-23.561726,-46.656209,17z" },
    { id:2, nome:"KINGS BURGER", img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400", mais:"Combo King", link_mapa: "https://www.google.com/maps/place/McDonald's/@-23.561726,-46.656209,17z" }
  ];

  // --- LOGOUT E LIMPEZA ---
  const logout = useCallback(() => {
    localStorage.removeItem("user");
    setUser(null);
    setTela("perfil");
  }, []);

  // --- SISTEMA DE ENTRAR / LOGIN (CORRIGIDO) ---
  const entrarOuCadastrar = () => {
    if(!telefone) return alert("Digite seu telefone");
    
    // Simulação de validação e cadastro (como se fosse Adan)
    const userData = { nome: "Adan", telefone: telefone };
    localStorage.setItem("user", JSON.stringify(userData));
    setUser(userData);
    alert("Telefone validado!");
    setTela("home"); // Carrega a tela home (Mais pedidos)
  };

  useEffect(() => {
    const u = localStorage.getItem("user");
    if(u) {
      setUser(JSON.parse(u));
      setTela("home"); // Se já logado, vai pra home
    }
  }, []);

  // --- AÇÃO DE IR PARA O SITE/MAPA (CORRIGIDO) ---
  const irParaRestaurante = (link) => {
    if(link){
      window.open(link, "_blank"); // Abre em nova aba
    } else {
      alert("Link do restaurante não disponível.");
    }
  };

  return(
    <div className="max-w-md mx-auto pb-20 min-h-screen">
      <header className="bg-red-600 text-white text-center p-4 font-black text-xl shadow-lg italic">
        MYDI DELIVERY
      </header>

      {tela==="home" && (
        <div className="p-3">
          <div className="bg-red-500 text-white px-3 py-1 rounded-full w-fit text-xs mb-3 font-bold uppercase">Cardápio do Dia</div>
          <h2 className="font-black mb-2 text-gray-800 uppercase italic">Mais pedidos</h2>
          <div className="scroll-x">
            {restaurantes.map(r=>(
              <div key={r.id} className="min-w-[150px] bg-white rounded-2xl shadow-md border border-gray-100">
                <img src={r.img} className="h-28 w-full object-cover rounded-t-2xl"/>
                <div className="p-3">
                  <p className="text-xs font-black text-gray-800">{r.nome}</p>
                  <p className="text-[10px] text-gray-500 mb-2">{r.mais}</p>
                  <button onClick={()=>irParaRestaurante(r.link_mapa)} className="w-full bg-green-500 text-white text-xs py-2 rounded-lg font-black uppercase">Pedir</button>
                </div>
              </div>
            ))}
          </div>
          
          <h2 className="font-black mt-6 mb-3 text-gray-800 uppercase italic">Próximos de você</h2>
          <div className="space-y-3">
            {restaurantes.map(r=>(
              <div key={r.id} className="bg-white rounded-2xl shadow-sm flex items-center p-3 border border-gray-50">
                <img src={r.img} className="w-20 h-20 rounded-xl object-cover" />
                <div className="ml-3 flex-1">
                  <h3 className="font-black text-sm text-gray-800">{r.nome}</h3>
                  <p className="text-[10px] text-gray-400">Entrega Grátis • 30 min</p>
                  <button onClick={()=>irParaRestaurante(r.link_mapa)} className="mt-2 bg-red-600 text-white text-[10px] px-4 py-1.5 rounded-full font-black uppercase">Ver Menu</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {tela==="pedidos" && (
        <div className="p-4">
          <h2 className="font-black mb-4 text-gray-800 uppercase italic">Meus Pedidos</h2>
          <p className="text-center text-gray-400 mt-20 font-bold">Nenhum pedido realizado ainda.</p>
        </div>
      )}

      {tela==="perfil" && (
        <div className="p-4">
          {!user ? (
            <div className="bg-white p-6 rounded-3xl shadow-xl border border-gray-100 mt-10">
              <h2 className="text-center font-black text-gray-800 mb-6 uppercase italic text-xl">Entrar no Mydi</h2>
              <div className="space-y-4">
                <input placeholder="Digite seu Telefone" className="w-full p-4 border-2 border-gray-100 rounded-2xl bg-gray-50 font-bold focus:border-red-500 outline-none transition-all" onChange={e=>setTelefone(e.target.value)} />
                <input placeholder="Seu Nome (Para novos clientes)" className="w-full p-4 border-2 border-gray-100 rounded-2xl bg-gray-50 font-bold focus:border-red-500 outline-none transition-all" onChange={e=>setNome(e.target.value)} />
                <button onClick={entrarOuCadastrar} className="w-full bg-red-600 text-white p-4 rounded-2xl font-black shadow-lg shadow-red-200 uppercase tracking-widest text-sm">Entrar Agora</button>
              </div>
              <p className="text-[10px] text-gray-400 text-center mt-6 px-4">Ao entrar, você concorda com nossos termos de uso e privacidade.</p>
            </div>
          ):(
            <div className="space-y-4">
              <div className="bg-white p-6 rounded-3xl shadow-md border-b-8 border-red-600">
                <p className="text-[10px] font-black text-red-600 uppercase tracking-widest mb-1">Cliente VIP</p>
                <h2 className="font-black text-2xl text-gray-800">{user.nome}</h2>
                <p className="text-gray-400 font-bold text-sm">{user.telefone}</p>
                <button onClick={logout} className="mt-6 text-xs text-red-500 font-black uppercase underline">Sair da Conta</button>
              </div>

              <div className="bg-gray-800 p-5 rounded-3xl shadow-lg text-white">
                <h3 className="text-xs font-black uppercase mb-4 text-center tracking-widest">Baixar Aplicativo Mydi</h3>
                <div className="grid grid-cols-2 gap-3">
                  <button className="bg-white/10 hover:bg-white/20 p-3 rounded-2xl flex flex-col items-center gap-2 transition-all">
                    <IconDownload/> <span className="text-[9px] font-black uppercase">Android</span>
                  </button>
                  <button className="bg-white/10 hover:bg-white/20 p-3 rounded-2xl flex flex-col items-center gap-2 transition-all">
                    <IconDownload/> <span className="text-[9px] font-black uppercase">iPhone</span>
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      )}

      {/* --- BARRA DE NAVEGAÇÃO --- */}
      <nav className="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-gray-100 flex justify-around p-4 z-50">
        <button onClick={()=>setTela("home")} className={tela==="home" ? "text-red-600 scale-125 transition-transform" : "text-gray-300"}><IconHome/></button>
        <button onClick={()=>setTela("pedidos")} className={tela==="pedidos" ? "text-red-600 scale-125 transition-transform" : "text-gray-300"}><IconBox/></button>
        <button onClick={()=>setTela("perfil")} className={tela==="perfil" ? "text-red-600 scale-125 transition-transform" : "text-gray-300"}><IconUser/></button>
      </nav>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

</body>
</html>
