<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYDI DELIVERY</title>

<meta name="theme-color" content="#dc2626"/>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mydi">
<link rel="apple-touch-icon" href="imagem/icon-192.png">

<link rel="manifest" href="manifest.json">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCXA1yP1F-riNkzOX5zJs5gsQ82EzsT7Qg",
  authDomain: "myproject26-10f0e.firebaseapp.com",
  databaseURL: "https://myproject26-10f0e-default-rtdb.firebaseio.com",
  projectId: "myproject26-10f0e"
};

firebase.initializeApp(firebaseConfig);
window.db = firebase.database();
</script>

<style>
.scroll-x {
  display: flex;
  overflow-x: auto;
  gap: 12px;
  padding-bottom: 10px;
}
.scroll-x::-webkit-scrollbar { display: none; }
</style>

</head>

<body class="bg-gray-100">
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect } = React;

function IconHome(){ return <svg className="w-6 h-6" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 10l9-6 9 6v10a2 2 0 01-2 2h-4v-6H9v6H5a2 2 0 01-2-2z"/></svg>; }
function IconBox(){ return <svg className="w-6 h-6" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 3h18v6H3z"/><path d="M3 9v12h18V9"/></svg>; }
function IconUser(){ return <svg className="w-6 h-6" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="7" r="4"/><path d="M5.5 21a6.5 6.5 0 0113 0"/></svg>; }
function IconShare(){ return <svg className="w-5 h-5 inline" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>; }
function IconPlusBox(){ return <svg className="w-5 h-5 inline" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>; }
function IconDownload(){ return <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>; }

function App(){

  const [tela, setTela] = useState("home");
  const [user, setUser] = useState(null);
  const [nome, setNome] = useState("");
  const [telefone, setTelefone] = useState("");
  const [pedidos, setPedidos] = useState([]);
  
  const [showInstall, setShowInstall] = useState(false);
  const [platform, setPlatform] = useState(""); 
  const [deferredPrompt, setDeferredPrompt] = useState(null);

  const restaurantes = [
    { id:1, nome:"SNOOP LANCHE", img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400", mais:"X-Burgão" },
    { id:2, nome:"KINGS BURGER", img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400", mais:"Combo King" }
  ];

  useEffect(() => {
    const isAndroid = /android/i.test(navigator.userAgent);
    const handler = (e) => {
      e.preventDefault();
      setDeferredPrompt(e);
      if (isAndroid && !window.matchMedia('(display-mode: standalone)').matches) {
        setPlatform("android");
        setShowInstall(true);
      }
    };
    window.addEventListener("beforeinstallprompt", handler);
    return () => window.removeEventListener("beforeinstallprompt", handler);
  }, []);

  const abrirInstalacaoManual = (tipo) => {
    setPlatform(tipo);
    setShowInstall(true);
  };

  const instalarAppAndroid = async () => {
    if (!deferredPrompt) {
      alert("O aplicativo ja esta instalado ou seu navegador nao suporta a instalacao automatica.");
      return;
    }
    deferredPrompt.prompt();
    const choice = await deferredPrompt.userChoice;
    if (choice.outcome === "accepted") { setDeferredPrompt(null); }
    setShowInstall(false);
  };

  const salvarUser = () => {
    if(!nome || !telefone) return alert("Preencha todos os campos");
    const userData = { nome, telefone };
    localStorage.setItem("user", JSON.stringify(userData));
    setUser(userData);
  };

  useEffect(()=>{
    const u = localStorage.getItem("user");
    if(u) setUser(JSON.parse(u));
  },[]);

  useEffect(()=>{
    if(user){
      db.ref("pedidos/"+user.telefone).on("value", snap=>{
        const data = snap.val() || {};
        setPedidos(Object.values(data));
      });
    }
  },[user]);

  const fazerPedido = (rest) => {
    if(!user) return setTela("perfil");
    const pedido = {
      restaurante: rest.nome,
      item: rest.mais,
      status: "Preparando",
      data: new Date().toLocaleString()
    };
    db.ref("pedidos/"+user.telefone).push(pedido);
    alert("Pedido realizado");
  };

  return(
    <div className="max-w-md mx-auto pb-20">

      <header className="bg-red-600 text-white text-center p-4 font-bold text-lg">
        MYDI DELIVERY
      </header>

      {tela==="home" && (
        <div className="p-3">
          <div className="bg-red-500 text-white px-3 py-1 rounded w-fit text-sm mb-3">Lanches</div>
          <h2 className="font-bold mb-2 text-gray-800">Mais pedidos</h2>
          <div className="scroll-x">
            {restaurantes.map(r=>(
              <div key={r.id} className="min-w-[140px] bg-white rounded-lg shadow">
                <img src={r.img} className="h-24 w-full object-cover rounded-t-lg"/>
                <div className="p-2">
                  <p className="text-xs font-bold">{r.nome}</p>
                  <p className="text-xs text-gray-500">{r.mais}</p>
                  <button onClick={()=>fazerPedido(r)} className="mt-1 w-full bg-green-500 text-white text-xs p-1 rounded">Pedir</button>
                </div>
              </div>
            ))}
          </div>
          <h2 className="font-bold mt-4 mb-2 text-gray-800">Todos restaurantes</h2>
          <div className="space-y-3">
            {restaurantes.map(r=>(
              <div key={r.id} className="bg-white rounded-xl shadow flex items-center p-2">
                <img src={r.img} className="w-20 h-20 rounded-lg object-cover" />
                <div className="ml-3 flex-1">
                  <h3 className="font-bold text-sm">{r.nome}</h3>
                  <p className="text-xs text-gray-500">Lanches - 30-40 min</p>
                  <p className="text-xs text-gray-400">Nota 4.8 - Entrega R$ 5,00</p>
                </div>
                <button onClick={()=>fazerPedido(r)} className="bg-green-500 text-white text-xs px-3 py-1 rounded">Pedir</button>
              </div>
            ))}
          </div>
        </div>
      )}

      {tela==="pedidos" && (
        <div className="p-3">
          <h2 className="font-bold mb-3 text-gray-800">Meus pedidos</h2>
          {pedidos.length > 0 ? pedidos.map((p,i)=>(
            <div key={i} className="bg-white p-3 rounded mb-2 shadow border-l-4 border-red-500">
              <p className="font-bold">{p.restaurante}</p>
              <p className="text-sm text-gray-700">{p.item}</p>
              <p className="text-xs text-gray-500 uppercase font-bold">{p.status}</p>
            </div>
          )) : <p className="text-center text-gray-500 mt-10 text-sm">Nenhum pedido encontrado.</p>}
        </div>
      )}

      {tela==="perfil" && (
        <div className="p-4">
          {!user ? (
            <div className="bg-white p-4 rounded-xl shadow">
              <input placeholder="Nome completo" className="w-full p-2 mb-2 border rounded" onChange={e=>setNome(e.target.value)} />
              <input placeholder="Telefone" className="w-full p-2 mb-2 border rounded" onChange={e=>setTelefone(e.target.value)} />
              <button onClick={salvarUser} className="w-full bg-red-500 text-white p-2 rounded font-bold">Salvar Dados</button>
            </div>
          ):(
            <div className="space-y-4">
              <div className="bg-white p-4 rounded-xl shadow">
                <h2 className="font-bold text-lg text-gray-800">Ola, {user.nome}</h2>
                <p className="text-gray-600 text-sm">{user.telefone}</p>
              </div>

              {/* BOTÕES DE BAIXAR APP NO PERFIL */}
              <div className="bg-white p-4 rounded-xl shadow">
                <h3 className="text-sm font-bold text-gray-700 mb-3">Aplicativo Mydi</h3>
                <div className="grid grid-cols-2 gap-2">
                  <button onClick={() => abrirInstalacaoManual("android")} className="flex items-center justify-center gap-2 bg-gray-800 text-white p-2 rounded-lg text-xs font-bold uppercase">
                    <IconDownload/> Android
                  </button>
                  <button onClick={() => abrirInstalacaoManual("ios")} className="flex items-center justify-center gap-2 bg-gray-800 text-white p-2 rounded-lg text-xs font-bold uppercase">
                    <IconDownload/> iPhone
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      )}

      <div className="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-2">
        <button onClick={()=>setTela("home")} className={tela==="home" ? "text-red-500" : "text-gray-400"}><IconHome/></button>
        <button onClick={()=>setTela("pedidos")} className={tela==="pedidos" ? "text-red-500" : "text-gray-400"}><IconBox/></button>
        <button onClick={()=>setTela("perfil")} className={tela==="perfil" ? "text-red-500" : "text-gray-400"}><IconUser/></button>
      </div>

      {/* --- MODAL DE INSTALACAO --- */}
      {showInstall && (
        <div className="fixed inset-0 bg-black/60 flex items-end justify-center z-[100] p-4">
          <div className="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl">
            <h2 className="text-xl font-extrabold mb-2 text-gray-800 text-center uppercase">Instalar Mydi</h2>
            <p className="text-sm text-gray-500 mb-6 text-center">Tenha uma melhor experiencia instalando nosso aplicativo.</p>

            {platform === "android" ? (
              <button onClick={instalarAppAndroid} className="w-full bg-red-600 text-white py-3 rounded-xl font-bold text-lg mb-3 shadow-lg shadow-red-200 uppercase">
                Baixar Aplicativo
              </button>
            ) : (
              <div className="space-y-4 text-gray-700 bg-gray-50 p-4 rounded-xl border border-gray-200 mb-4 text-sm">
                <div className="flex items-center gap-3">
                  <div className="bg-white p-1 rounded shadow"><IconShare/></div>
                  <span>1. Clique no icone de compartilhar do Safari.</span>
                </div>
                <div className="flex items-center gap-3">
                  <div className="bg-white p-1 rounded shadow"><IconPlusBox/></div>
                  <span>2. Selecione Adicionar a Tela de Inicio.</span>
                </div>
                <div className="border-t pt-2 text-center font-bold text-red-600 uppercase">Pronto para uso.</div>
              </div>
            )}

            <button onClick={()=>setShowInstall(false)} className="w-full text-gray-400 text-sm font-bold uppercase">Agora nao</button>
          </div>
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
