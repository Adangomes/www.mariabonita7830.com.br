<style>
body { background:#f3f4f6; }
.card:hover { transform: scale(1.02); }
</style>

<body>
<div id="root"></div>

<script type="text/babel">

const { useState } = React;

function App(){

  const [restaurantes] = useState([
    {
      id:1,
      nome:"SNOOP LANCHE",
      url:"https://mydiapp.shop/",
      img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400",
      tipo:"LANCHES",
      promo:true
    },
    {
      id:2,
      nome:"KINGS BURGER",
      url:"https://loja.mydiapp.shop/",
      img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400",
      tipo:"LANCHES",
      promo:false
    }
  ]);

  const abrir = (url)=> window.location.assign(url);

  return(
    <div className="max-w-md mx-auto">

      <header className="bg-red-600 text-white text-center p-4 font-bold text-xl">
        MYDI DELIVERY
      </header>

      <div className="p-4 space-y-4">
        {restaurantes.map(r=>(
          <div key={r.id} onClick={()=>abrir(r.url)}
            className="card bg-white rounded-xl shadow cursor-pointer overflow-hidden">

            <img src={r.img} className="w-full h-40 object-cover"/>

            <div className="p-3 flex justify-between">
              <div>
                <h2 className="font-bold">{r.nome}</h2>
                <p className="text-xs text-gray-400">{r.tipo}</p>
              </div>

              {r.promo && (
                <span className="bg-red-500 text-white text-xs px-2 py-1 rounded">
                  PROMO
                </span>
              )}
            </div>
          </div>
        ))}
      </div>

      <footer className="text-center p-4 text-xs text-gray-400">
        <a href="politica-de-privacidade.html">Política de Privacidade</a>
      </footer>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
