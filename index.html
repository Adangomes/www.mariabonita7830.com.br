<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYDI DELIVERY</title>

<meta name="theme-color" content="#dc2626"/>
<link rel="manifest" href="manifest.json">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCXA1yP1F-riNkzOX5zJs5gsQ82EzsT7Qg",
  authDomain: "myproject26-10f0e.firebaseapp.com",
  databaseURL: "https://myproject26-10f0e-default-rtdb.firebaseio.com",
  projectId: "myproject26-10f0e"
};

firebase.initializeApp(firebaseConfig);
window.db = firebase.database();
</script>

<style>
.scroll-x {
  display: flex;
  overflow-x: auto;
  gap: 12px;
  padding-bottom: 10px;
}
.scroll-x::-webkit-scrollbar { display: none; }
</style>

</head>

<body class="bg-gray-100">
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect } = React;

function IconHome(){ return <svg className="w-6 h-6" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 10l9-6 9 6v10a2 2 0 01-2 2h-4v-6H9v6H5a2 2 0 01-2-2z"/></svg>; }
function IconBox(){ return <svg className="w-6 h-6" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 3h18v6H3z"/><path d="M3 9v12h18V9"/></svg>; }
function IconUser(){ return <svg className="w-6 h-6" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="7" r="4"/><path d="M5.5 21a6.5 6.5 0 0113 0"/></svg>; }

function App(){

  const [tela, setTela] = useState("home");
  const [user, setUser] = useState(null);
  const [nome, setNome] = useState("");
  const [telefone, setTelefone] = useState("");
  const [pedidos, setPedidos] = useState([]);

  const restaurantes = [
    {
      id:1,
      nome:"SNOOP LANCHE",
      img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400",
      mais:"X-Burgão"
    },
    {
      id:2,
      nome:"KINGS BURGER",
      img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400",
      mais:"Combo King"
    }
  ];

  const salvarUser = () => {
    if(!nome || !telefone) return alert("Preencha tudo");
    const userData = { nome, telefone };
    localStorage.setItem("user", JSON.stringify(userData));
    setUser(userData);
  };

  useEffect(()=>{
    const u = localStorage.getItem("user");
    if(u) setUser(JSON.parse(u));
  },[]);

  useEffect(()=>{
    if(user){
      db.ref("pedidos/"+user.telefone).on("value", snap=>{
        const data = snap.val() || {};
        setPedidos(Object.values(data));
      });
    }
  },[user]);

  const fazerPedido = (rest) => {
    if(!user) return setTela("perfil");

    const pedido = {
      restaurante: rest.nome,
      item: rest.mais,
      status: "Preparando",
      data: new Date().toLocaleString()
    };

    db.ref("pedidos/"+user.telefone).push(pedido);
    alert("Pedido feito!");
  };

  return(
    <div className="max-w-md mx-auto pb-20">

      {/* HEADER */}
      <header className="bg-red-600 text-white text-center p-4 font-bold text-lg">
        MYDI DELIVERY
      </header>

      {/* HOME */}
   {tela==="home" && (
  <div className="p-3">

    {/* CATEGORIA */}
    <div className="bg-red-500 text-white px-3 py-1 rounded w-fit text-sm mb-3">
      Lanches
    </div>

    {/* MAIS PEDIDOS (CARROSSEL) */}
    <h2 className="font-bold mb-2">Mais pedidos</h2>

    <div className="scroll-x">
      {restaurantes.map(r=>(
        <div key={r.id} className="min-w-[140px] bg-white rounded-lg shadow">

          <img src={r.img} className="h-24 w-full object-cover rounded-t-lg"/>

          <div className="p-2">
            <p className="text-xs font-bold">{r.nome}</p>
            <p className="text-xs text-gray-500">{r.mais}</p>

            <button 
              onClick={()=>fazerPedido(r)}
              className="mt-1 w-full bg-green-500 text-white text-xs p-1 rounded">
              Pedir
            </button>
          </div>

        </div>
      ))}
    </div>

    {/* LISTA DE RESTAURANTES (ESTILO IFOOD) */}
    <h2 className="font-bold mt-4 mb-2">Todos restaurantes</h2>

    <div className="space-y-3">
      {restaurantes.map(r=>(
        <div key={r.id} className="bg-white rounded-xl shadow flex items-center p-2">

          {/* IMAGEM */}
          <img 
            src={r.img}
            className="w-20 h-20 rounded-lg object-cover"
          />

          {/* INFO */}
          <div className="ml-3 flex-1">
            <h3 className="font-bold text-sm">{r.nome}</h3>

            <p className="text-xs text-gray-500">
              Lanches • 30-40 min
            </p>

            <p className="text-xs text-gray-400">
              ⭐ 4.8 • R$ 5,00 entrega
            </p>
          </div>

          {/* BOTÃO */}
          <button 
            onClick={()=>fazerPedido(r)}
            className="bg-green-500 text-white text-xs px-3 py-1 rounded">
            Pedir
          </button>

        </div>
      ))}
    </div>

  </div>
)}

      {/* PEDIDOS */}
      {tela==="pedidos" && (
        <div className="p-3">
          <h2 className="font-bold mb-3">Meus pedidos</h2>

          {pedidos.map((p,i)=>(
            <div key={i} className="bg-white p-3 rounded mb-2 shadow">
              <p className="font-bold">{p.restaurante}</p>
              <p className="text-sm">{p.item}</p>
              <p className="text-xs text-gray-500">{p.status}</p>
            </div>
          ))}
        </div>
      )}

      {/* PERFIL */}
      {tela==="perfil" && (
        <div className="p-4">

          {!user ? (
            <>
              <input placeholder="Nome"
                className="w-full p-2 mb-2 border rounded"
                onChange={e=>setNome(e.target.value)}
              />

              <input placeholder="Telefone"
                className="w-full p-2 mb-2 border rounded"
                onChange={e=>setTelefone(e.target.value)}
              />

              <button onClick={salvarUser}
                className="w-full bg-red-500 text-white p-2 rounded">
                Salvar
              </button>
            </>
          ):(
            <>
              <h2 className="font-bold">Olá, {user.nome}</h2>
              <p>{user.telefone}</p>
            </>
          )}

        </div>
      )}

      {/* MENU */}
      <div className="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-2">

        <button onClick={()=>setTela("home")} className={tela==="home" ? "text-red-500" : ""}>
          <IconHome/>
        </button>

        <button onClick={()=>setTela("pedidos")} className={tela==="pedidos" ? "text-red-500" : ""}>
          <IconBox/>
        </button>

        <button onClick={()=>setTela("perfil")} className={tela==="perfil" ? "text-red-500" : ""}>
          <IconUser/>
        </button>

      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
